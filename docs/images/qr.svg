<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bg_qr)"/>

  <!-- Stylized QR Code Group -->
  <g transform="translate(45, 45)">
    <!-- QR Grid Outer Bound: 110x110 -->
    <!-- Top-Left Finder Pattern -->
    <rect x="0" y="0" width="34" height="34" rx="6" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="2.5"/>
    <rect x="8" y="8" width="18" height="18" rx="3" fill="#22d3ee" opacity="0.3"/>
    <rect x="12" y="12" width="10" height="10" rx="1.5" fill="#22d3ee"/>

    <!-- Top-Right Finder Pattern -->
    <rect x="76" y="0" width="34" height="34" rx="6" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="2.5"/>
    <rect x="84" y="8" width="18" height="18" rx="3" fill="#22d3ee" opacity="0.3"/>
    <rect x="88" y="12" width="10" height="10" rx="1.5" fill="#22d3ee"/>

    <!-- Bottom-Left Finder Pattern -->
    <rect x="0" y="76" width="34" height="34" rx="6" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="2.5"/>
    <rect x="8" y="84" width="18" height="18" rx="3" fill="#22d3ee" opacity="0.3"/>
    <rect x="12" y="88" width="10" height="10" rx="1.5" fill="#22d3ee"/>

    <!-- Alignment / Timing patterns & random bits -->
    <!-- Horizontal Timing Pattern line of dots -->
    <circle cx="45" cy="17" r="3" fill="#22d3ee" opacity="0.8"/>
    <circle cx="55" cy="17" r="3" fill="#22d3ee" opacity="0.5"/>
    <circle cx="65" cy="17" r="3" fill="#22d3ee" opacity="0.8"/>

    <!-- Vertical Timing Pattern line of dots -->
    <circle cx="17" cy="45" r="3" fill="#22d3ee" opacity="0.8"/>
    <circle cx="17" cy="55" r="3" fill="#22d3ee" opacity="0.5"/>
    <circle cx="17" cy="65" r="3" fill="#22d3ee" opacity="0.8"/>

    <!-- Random QR bits / modules in the rest of the grid -->
    <rect x="42" y="42" width="10" height="10" rx="2" fill="#22d3ee" opacity="0.7"/>
    <rect x="58" y="42" width="10" height="10" rx="2" fill="#22d3ee"/>
    <rect x="42" y="58" width="10" height="10" rx="2" fill="#22d3ee" opacity="0.4"/>
    <rect x="58" y="58" width="22" height="10" rx="2" fill="#22d3ee" opacity="0.9"/>
    
    <rect x="42" y="76" width="10" height="22" rx="2" fill="#22d3ee" opacity="0.6"/>
    <rect x="58" y="88" width="10" height="10" rx="2" fill="#22d3ee"/>
    <rect x="88" y="42" width="10" height="22" rx="2" fill="#22d3ee" opacity="0.8"/>
    <rect x="76" y="88" width="10" height="10" rx="2" fill="#22d3ee" opacity="0.5"/>
    <rect x="76" y="76" width="22" height="8" rx="2" fill="#22d3ee" opacity="0.7"/>
  </g>

  <!-- Offline / Security Badge (Bottom-Right, overlapping slightly) -->
  <g transform="translate(145, 145)">
    <circle cx="0" cy="0" r="22" fill="#020617" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="18" fill="rgba(34,211,238,0.06)"/>
    <!-- Cloud shape -->
    <path d="M-8 2 A5 5 0 0 1 -4 -6 A6 6 0 0 1 6 -4 A4 4 0 0 1 6 4 L-6 4 A3 3 0 0 1 -8 2 Z" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Slash across cloud indicating offline -->
    <line x1="-10" y1="6" x2="10" y2="-8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Sparkle / Star decorations -->
  <text x="24" y="38" font-size="10" fill="rgba(34,211,238,0.5)">✦</text>
  <text x="175" y="45" font-size="8" fill="rgba(34,211,238,0.3)">✦</text>

  <defs>
    <radialGradient id="bg_qr" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#083344"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
  </defs>
</svg>
